<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    /* ── Mode selection overlay ───────────────────────────── */
    #mode-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 2.5vh, 2rem);
      z-index: 100;
    }

    #mode-screen .ms-title {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      letter-spacing: 0.12em;
      color: #e94560;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
    }

    #mode-screen .ms-sub {
      font-size: clamp(0.75rem, 1.5vw, 0.95rem);
      color: #7a7a90;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .mode-btn {
      padding: clamp(0.55rem, 1.6vh, 0.9rem) clamp(1.5rem, 5vw, 3rem);
      font-size: clamp(0.8rem, 1.7vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      border: 2px solid;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      background: transparent;
      min-width: clamp(170px, 28vw, 240px);
    }

    .mode-btn.vs-ai {
      border-color: #e94560;
      color: #e94560;
    }
    .mode-btn.vs-ai:hover {
      background: #e94560;
      color: #fff;
    }
    .mode-btn.vs-player {
      border-color: #a8dadc;
      color: #a8dadc;
    }
    .mode-btn.vs-player:hover {
      background: #a8dadc;
      color: #1a1a2e;
    }

    /* ── Game layout ──────────────────────────────────────── */
    .game-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 5vw, 6rem);
      padding: clamp(0.75rem, 3vh, 3rem) clamp(1rem, 4vw, 5rem);
      width: 100%;
      height: 100%;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.55rem, 1.8vh, 1.6rem);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.1rem, 2.8vw, 2.2rem);
      letter-spacing: 0.12em;
      color: #e94560;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.15;
    }

    #mode-badge {
      font-size: clamp(0.58rem, 1vw, 0.72rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a7a90;
      margin-top: -0.3rem;
    }

    #status {
      font-size: clamp(0.75rem, 1.5vw, 1.05rem);
      min-height: 1.4em;
      color: #a8dadc;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
    }

    #status.ai-turn {
      color: #f4a261;
      animation: blink 0.9s step-start infinite;
    }

    @keyframes blink { 50% { opacity: 0.35; } }

    #score {
      display: flex;
      gap: clamp(0.8rem, 2.5vw, 2.5rem);
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .score-item .label {
      font-size: clamp(0.58rem, 1.1vw, 0.75rem);
      letter-spacing: 0.1em;
      color: #a0a0b0;
      text-transform: uppercase;
    }

    .score-item .val {
      font-weight: 700;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    }

    .score-item.left-score  .val { color: #e94560; }
    .score-item.right-score .val { color: #a8dadc; }
    .score-item.draw-score  .val { color: #f4a261; }

    #restart {
      padding: clamp(0.35rem, 1.2vh, 0.65rem) clamp(0.9rem, 3vw, 2rem);
      font-size: clamp(0.68rem, 1.3vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }
    #restart:hover { background: #c73652; transform: scale(1.04); }

    #change-mode {
      font-size: clamp(0.58rem, 1.05vw, 0.72rem);
      color: #7a7a90;
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
      padding: 0;
      text-transform: uppercase;
    }
    #change-mode:hover { color: #bbb; }

    /* ── Board ────────────────────────────────────────────── */
    #board {
      --board-size: min(82vh, 46vw);
      width: var(--board-size);
      height: var(--board-size);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(4px, 1vmin, 10px);
    }

    .cell {
      background: #16213e;
      border-radius: clamp(6px, 1.5vmin, 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 5vmin, 3.2rem);
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.locked) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.locked { cursor: not-allowed; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Mode selection overlay -->
  <div id="mode-screen">
    <div class="ms-title">Tic Tac Toe</div>
    <div class="ms-sub">Choose how to play</div>
    <button class="mode-btn vs-ai" id="btn-ai">Play vs AI</button>
    <button class="mode-btn vs-player" id="btn-pvp">Play vs Player</button>
  </div>

  <!-- Game screen -->
  <div class="game-container">
    <div class="info-panel">
      <h1>Tic<br>Tac<br>Toe</h1>
      <div id="mode-badge"></div>
      <div id="status"></div>
      <div id="score">
        <div class="score-item left-score">
          <span class="label" id="label-left">X</span>
          <span class="val" id="score-left">0</span>
        </div>
        <div class="score-item draw-score">
          <span class="label">Draw</span>
          <span class="val" id="score-draw">0</span>
        </div>
        <div class="score-item right-score">
          <span class="label" id="label-right">O</span>
          <span class="val" id="score-right">0</span>
        </div>
      </div>
      <button id="restart">New Game</button>
      <button id="change-mode">Change Mode</button>
    </div>

    <div id="board"></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    // ── State ────────────────────────────────────────────────
    let board, current, gameOver, locked;
    let mode = null;          // 'pvp' | 'ai'
    let playerMark = null;    // 'X' | 'O' (AI mode only)
    let aiMark = null;
    let scores = { left: 0, right: 0, D: 0 };
    // In PvP:  left=X wins,      right=O wins
    // In AI:   left=player wins, right=AI wins

    // ── Mode screen ──────────────────────────────────────────
    document.getElementById('btn-ai').addEventListener('click',  () => startGame('ai'));
    document.getElementById('btn-pvp').addEventListener('click', () => startGame('pvp'));

    function showModeScreen() {
      document.getElementById('mode-screen').style.display = 'flex';
    }
    function hideModeScreen() {
      document.getElementById('mode-screen').style.display = 'none';
    }

    function startGame(selectedMode) {
      mode = selectedMode;
      scores = { left: 0, right: 0, D: 0 };
      hideModeScreen();
      init();
    }

    // ── Init ─────────────────────────────────────────────────
    function init() {
      board    = Array(9).fill(null);
      gameOver = false;
      locked   = false;

      if (mode === 'ai') {
        playerMark = Math.random() < 0.5 ? 'X' : 'O';
        aiMark     = playerMark === 'X' ? 'O' : 'X';
        current    = Math.random() < 0.5 ? 'X' : 'O';
      } else {
        playerMark = null;
        aiMark     = null;
        current    = 'X';
      }

      updateLabels();
      render();
      updateStatus();

      if (mode === 'ai' && current === aiMark) {
        locked = true;
        render();
        setTimeout(doAiMove, 700);
      }
    }

    // ── Labels & badge ───────────────────────────────────────
    function updateLabels() {
      const badge = document.getElementById('mode-badge');
      if (mode === 'ai') {
        badge.textContent = `vs AI  ·  You: ${playerMark}  AI: ${aiMark}`;
        document.getElementById('label-left').textContent  = 'You';
        document.getElementById('label-right').textContent = 'AI';
      } else {
        badge.textContent = 'vs Player';
        document.getElementById('label-left').textContent  = 'X';
        document.getElementById('label-right').textContent = 'O';
      }
    }

    // ── Status ───────────────────────────────────────────────
    function updateStatus() {
      const el = document.getElementById('status');
      el.classList.remove('ai-turn');
      if (mode === 'ai') {
        if (current === aiMark) {
          el.textContent = 'AI thinking…';
          el.classList.add('ai-turn');
        } else {
          el.textContent = `Your turn  (${playerMark})`;
        }
      } else {
        el.textContent = `${current}'s turn`;
      }
    }

    // ── Render ───────────────────────────────────────────────
    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        const isLocked = (locked || gameOver) && !val;
        cell.className = 'cell'
          + (val ? ` ${val.toLowerCase()} taken` : '')
          + (isLocked ? ' locked' : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
      document.getElementById('score-left').textContent  = scores.left;
      document.getElementById('score-right').textContent = scores.right;
      document.getElementById('score-draw').textContent  = scores.D;
    }

    // ── Player move ──────────────────────────────────────────
    function move(i) {
      if (gameOver || locked || board[i]) return;
      if (mode === 'ai' && current === aiMark) return;
      board[i] = current;
      afterMove();
    }

    // ── After any move ───────────────────────────────────────
    function afterMove() {
      const win = checkWin();
      if (win) {
        // Update scores by role
        if (mode === 'ai') {
          if (current === playerMark) scores.left++;
          else scores.right++;
        } else {
          if (current === 'X') scores.left++;
          else scores.right++;
        }
        gameOver = true;
        locked   = false;
        render();
        highlight(win);
        const statusEl = document.getElementById('status');
        statusEl.classList.remove('ai-turn');
        if (mode === 'ai') {
          statusEl.textContent = current === playerMark ? 'You win! 🎉' : 'AI wins';
        } else {
          statusEl.textContent = `${current} wins!`;
        }
      } else if (board.every(Boolean)) {
        scores.D++;
        gameOver = true;
        locked   = false;
        render();
        const statusEl = document.getElementById('status');
        statusEl.classList.remove('ai-turn');
        statusEl.textContent = "It's a draw!";
      } else {
        current = current === 'X' ? 'O' : 'X';
        if (mode === 'ai' && current === aiMark) {
          locked = true;
          render();
          updateStatus();
          setTimeout(doAiMove, 600);
        } else {
          render();
          updateStatus();
        }
      }
    }

    // ── Win check ────────────────────────────────────────────
    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function highlight(cells) {
      document.querySelectorAll('.cell').forEach((el, i) => {
        if (cells.includes(i)) el.classList.add('win');
      });
    }

    // ── AI (minimax) ─────────────────────────────────────────
    function getWinner(b) {
      for (const [a, bi, c] of WINS) {
        if (b[a] && b[a] === b[bi] && b[a] === b[c]) return b[a];
      }
      return null;
    }

    function minimax(b, depth, isMax) {
      const w = getWinner(b);
      if (w === aiMark)     return 10 - depth;
      if (w === playerMark) return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = aiMark;
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = playerMark;
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    function getBestMove() {
      let bestVal = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = aiMark;
          const val = minimax(board, 0, false);
          board[i] = null;
          if (val > bestVal) { bestVal = val; bestMove = i; }
        }
      }
      return bestMove;
    }

    function doAiMove() {
      if (gameOver || current !== aiMark) return;
      board[getBestMove()] = aiMark;
      locked = false;
      afterMove();
    }

    // ── Buttons ──────────────────────────────────────────────
    document.getElementById('restart').addEventListener('click', init);

    document.getElementById('change-mode').addEventListener('click', () => {
      mode = null;
      showModeScreen();
    });
  </script>
</body>
</html>
