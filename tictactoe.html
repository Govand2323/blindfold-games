<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .game-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 5vw, 6rem);
      padding: clamp(0.75rem, 3vh, 3rem) clamp(1rem, 4vw, 5rem);
      width: 100%;
      height: 100%;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.6rem, 2vh, 1.8rem);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.1rem, 2.8vw, 2.2rem);
      letter-spacing: 0.12em;
      color: #e94560;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.15;
    }

    #status {
      font-size: clamp(0.75rem, 1.5vw, 1.1rem);
      min-height: 1.4em;
      color: #a8dadc;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
    }

    #score {
      display: flex;
      gap: clamp(0.8rem, 2.5vw, 2.5rem);
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .score-item .label {
      font-size: clamp(0.6rem, 1.1vw, 0.78rem);
      letter-spacing: 0.1em;
      color: #a0a0b0;
      text-transform: uppercase;
    }

    .score-item .val {
      font-weight: 700;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    }

    .score-item.x-score    .val { color: #e94560; }
    .score-item.o-score    .val { color: #a8dadc; }
    .score-item.draw-score .val { color: #f4a261; }

    #restart {
      padding: clamp(0.35rem, 1.2vh, 0.7rem) clamp(0.9rem, 3vw, 2.2rem);
      font-size: clamp(0.7rem, 1.3vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    #restart:hover { background: #c73652; transform: scale(1.04); }

    #board {
      --board-size: min(82vh, 46vw);
      width: var(--board-size);
      height: var(--board-size);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(4px, 1vmin, 10px);
    }

    .cell {
      background: #16213e;
      border-radius: clamp(6px, 1.5vmin, 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 5vmin, 3.2rem);
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="info-panel">
      <h1>Tic<br>Tac<br>Toe</h1>
      <div id="status">X's turn</div>
      <div id="score">
        <div class="score-item x-score">
          <span class="label">X</span>
          <span class="val" id="x-count">0</span>
        </div>
        <div class="score-item draw-score">
          <span class="label">Draw</span>
          <span class="val" id="d-count">0</span>
        </div>
        <div class="score-item o-score">
          <span class="label">O</span>
          <span class="val" id="o-count">0</span>
        </div>
      </div>
      <button id="restart">New Game</button>
    </div>

    <div id="board"></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };
      render();
      setStatus(`${current}'s turn`);
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
      document.getElementById('x-count').textContent = scores.X;
      document.getElementById('o-count').textContent = scores.O;
      document.getElementById('d-count').textContent = scores.D;
    }

    function move(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      const win = checkWin();
      if (win) {
        scores[current]++;
        gameOver = true;
        render();
        highlight(win);
        setStatus(`${current} wins!`);
      } else if (board.every(Boolean)) {
        scores.D++;
        gameOver = true;
        render();
        setStatus("It's a draw!");
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
        setStatus(`${current}'s turn`);
      }
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function highlight(cells) {
      const els = document.querySelectorAll('.cell');
      cells.forEach(i => els[i].classList.add('win'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
