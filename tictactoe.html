<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
      text-transform: uppercase;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      min-height: 1.6rem;
      color: #a8dadc;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
      color: #a0a0b0;
    }

    #score span { font-weight: 700; font-size: 1.4rem; }
    #score .x-score span { color: #e94560; }
    #score .o-score span { color: #a8dadc; }
    #score .draw-score span { color: #f4a261; }

    #restart {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    #restart:hover { background: #c73652; transform: scale(1.04); }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="score">
    <div class="x-score">X <span id="x-count">0</span></div>
    <div class="draw-score">Draws <span id="d-count">0</span></div>
    <div class="o-score">O <span id="o-count">0</span></div>
  </div>
  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };
      render();
      setStatus(`${current}'s turn`);
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
      document.getElementById('x-count').textContent = scores.X;
      document.getElementById('o-count').textContent = scores.O;
      document.getElementById('d-count').textContent = scores.D;
    }

    function move(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      const win = checkWin();
      if (win) {
        scores[current]++;
        gameOver = true;
        render();
        highlight(win);
        setStatus(`${current} wins!`);
      } else if (board.every(Boolean)) {
        scores.D++;
        gameOver = true;
        render();
        setStatus("It's a draw!");
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
        setStatus(`${current}'s turn`);
      }
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function highlight(cells) {
      const els = document.querySelectorAll('.cell');
      cells.forEach(i => els[i].classList.add('win'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
