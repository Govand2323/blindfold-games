<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; image-rendering: pixelated; }

    #dpad { display: none; }
    @media (pointer: coarse) {
      #dpad { display: block; }
      canvas { touch-action: none; }
    }
    #dpad {
      position: fixed;
      z-index: 50;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .dp-btn {
      position: absolute;
      width: 58px; height: 58px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: rgba(255,255,255,0.8);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.06s, border-color 0.06s, color 0.06s;
    }
    .dp-btn.pressed {
      background: rgba(34,197,94,0.35);
      border-color: rgba(74,222,128,0.7);
      color: #4ADE80;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dpad">
  <div class="dp-btn" id="dp-up">↑</div>
  <div class="dp-btn" id="dp-left">←</div>
  <div class="dp-btn" id="dp-right">→</div>
  <div class="dp-btn" id="dp-down">↓</div>
</div>
<script>
  // ── Constants ──────────────────────────────────────────────
  const W = 640, H = 360;
  const CELL = 20, COLS = 32, ROWS = 16, HUD_H = 40;
  const TICK_MS = 120;
  const POWER_DURATION = 5000;
  const BTN = 58, GAP = 6, COL1 = BTN + GAP;

  // ── Canvas ─────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ── D-pad element ──────────────────────────────────────────
  const dpad = document.getElementById('dpad');

  // ── Game state ─────────────────────────────────────────────
  let snake, dir, nextDir, fruit, powerUp, score, highScore = 0, phase;
  let tickAccum = 0;
  let pulse = 0, starRot = 0, startPulse = 0;

  const STEP = 1000 / 60;   // fixed physics step — frame-rate independent
  let lastTime = 0, accumulator = 0;

  // ── Resize ─────────────────────────────────────────────────
  function resize() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
    layoutDpad();
  }
  window.addEventListener('resize', resize);

  // ── D-pad layout ────────────────────────────────────────────
  function layoutDpad() {
    const r = canvas.getBoundingClientRect();
    const dW = BTN*3 + GAP*2, dH = BTN*3 + GAP*2;
    dpad.style.cssText = `left:${r.left+10}px;top:${r.bottom-dH-10}px;width:${dW}px;height:${dH}px;`;
    document.getElementById('dp-up').style.cssText    = `left:${COL1}px;top:0;`;
    document.getElementById('dp-left').style.cssText  = `left:0;top:${COL1}px;`;
    document.getElementById('dp-right').style.cssText = `left:${COL1*2}px;top:${COL1}px;`;
    document.getElementById('dp-down').style.cssText  = `left:${COL1}px;top:${COL1*2}px;`;
  }

  // ── Helpers ────────────────────────────────────────────────
  function randCell(exclude, alsoExclude) {
    let p;
    do {
      p = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 };
    } while (
      exclude.some(s => s.x === p.x && s.y === p.y) ||
      (alsoExclude && alsoExclude.x === p.x && alsoExclude.y === p.y)
    );
    return p;
  }

  function cellLeft(col) { return col * CELL; }
  function cellTop(row)  { return HUD_H + row * CELL; }

  function drawStar(cx, cy, outerR, innerR, pts, color) {
    ctx.beginPath();
    for (let i = 0; i < pts * 2; i++) {
      const a = (i * Math.PI / pts) - Math.PI / 2;
      const r = i % 2 === 0 ? outerR : innerR;
      i === 0 ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r)
              : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  // ── Init ───────────────────────────────────────────────────
  function initGame(skipStart = false) {
    snake      = [{ x: 10, y: 8 }, { x: 9, y: 8 }, { x: 8, y: 8 }];
    dir        = { x: 1, y: 0 };
    nextDir    = { x: 1, y: 0 };
    fruit      = randCell(snake, null);
    powerUp    = null;
    score      = 0;
    phase      = skipStart ? 'playing' : 'start';
    tickAccum  = 0;
    startPulse = 0;
  }

  // ── Input ──────────────────────────────────────────────────
  const DIRS = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
    ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x:  1, y: 0 }, d: { x:  1, y: 0 }, D: { x:  1, y: 0 },
  };

  function setDir(d) {
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  }

  document.addEventListener('keydown', e => {
    if (phase === 'start') { phase = 'playing'; return; }
    if ((e.key === 'r' || e.key === 'R') && phase === 'gameover') { initGame(true); return; }
    const d = DIRS[e.key];
    if (d) { e.preventDefault(); setDir(d); }
  });

  canvas.addEventListener('click', () => {
    if (phase === 'start') { phase = 'playing'; return; }
    if (phase === 'gameover') initGame(true);
  });

  // ── Tick ───────────────────────────────────────────────────
  function tick() {
    if (phase !== 'playing') return;
    dir = nextDir;

    const head = snake[0];
    const nx = (head.x + dir.x + COLS) % COLS;
    const ny = (head.y + dir.y + ROWS) % ROWS;

    // Self-collision (skip tail — it moves away this tick)
    for (let i = 1; i < snake.length - 1; i++) {
      if (snake[i].x === nx && snake[i].y === ny) {
        phase = 'gameover';
        if (score > highScore) highScore = score;
        return;
      }
    }

    snake.unshift({ x: nx, y: ny });

    let grew = false;
    if (nx === fruit.x && ny === fruit.y) {
      score += 10;
      fruit = randCell(snake, powerUp);
      if (!powerUp && Math.random() < 0.3) {
        powerUp = { ...randCell(snake, fruit), ms: POWER_DURATION };
      }
      grew = true;
    } else if (powerUp && nx === powerUp.x && ny === powerUp.y) {
      score += 25;
      powerUp = null;
      grew = true;
    }

    if (!grew) snake.pop();
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c*CELL, HUD_H); ctx.lineTo(c*CELL, H); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, HUD_H + r*CELL); ctx.lineTo(W, HUD_H + r*CELL); ctx.stroke();
    }

    // Snake (tail to head so head is on top)
    const inset = 2;
    for (let i = snake.length - 1; i >= 0; i--) {
      const bx = cellLeft(snake[i].x);
      const by = cellTop(snake[i].y);

      if (i === 0) {
        ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = 6;
        ctx.fillStyle = '#22C55E';
        ctx.fillRect(bx+inset, by+inset, CELL-inset*2, CELL-inset*2);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

        // Leading-edge highlight
        ctx.fillStyle = '#4ADE80';
        if      (dir.x ===  1) ctx.fillRect(bx+CELL-5,  by+inset,   3, CELL-inset*2);
        else if (dir.x === -1) ctx.fillRect(bx+inset,   by+inset,   3, CELL-inset*2);
        else if (dir.y === -1) ctx.fillRect(bx+inset,   by+inset,   CELL-inset*2, 3);
        else                   ctx.fillRect(bx+inset,   by+CELL-5,  CELL-inset*2, 3);

        // Eyes
        const ecx = bx + CELL/2 + dir.x*4;
        const ecy = by + CELL/2 + dir.y*4;
        const e1x = ecx - dir.y*3, e1y = ecy + dir.x*3;
        const e2x = ecx + dir.y*3, e2y = ecy - dir.x*3;
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath(); ctx.arc(e1x, e1y, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath(); ctx.arc(e1x-0.5, e1y-0.5, 0.7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x-0.5, e2y-0.5, 0.7, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = i % 2 === 0 ? '#16A34A' : '#15803D';
        ctx.fillRect(bx+inset, by+inset, CELL-inset*2, CELL-inset*2);
      }
    }

    // Regular fruit
    {
      const fx = cellLeft(fruit.x), fy = cellTop(fruit.y);
      const cx = fx + CELL/2, cy = fy + CELL/2 + 1;
      ctx.fillStyle = '#EF4444';
      ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(cx-2, cy-2, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#4ADE80'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cx, cy-7); ctx.lineTo(cx+2, cy-11); ctx.stroke();
    }

    // Power-up
    if (powerUp) {
      const fx = cellLeft(powerUp.x), fy = cellTop(powerUp.y);
      const cx = fx + CELL/2, cy = fy + CELL/2;
      const pFrac = powerUp.ms / POWER_DURATION;
      const r = 7 + 1.5 * Math.sin(pulse);
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 13);
      grd.addColorStop(0, 'rgba(251,191,36,0.55)');
      grd.addColorStop(1, 'rgba(251,191,36,0)');
      ctx.beginPath(); ctx.arc(cx, cy, 13, 0, Math.PI*2); ctx.fillStyle = grd; ctx.fill();
      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(starRot);
      ctx.shadowColor = '#FBBF24'; ctx.shadowBlur = 8;
      drawStar(0, 0, r, r*0.42, 5, '#FCD34D');
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, 11, -Math.PI/2, -Math.PI/2 + Math.PI*2*pFrac);
      ctx.strokeStyle = pFrac > 0.4 ? '#FBBF24' : '#F97316';
      ctx.lineWidth = 2.5; ctx.stroke();
    }

    // HUD
    ctx.fillStyle = 'rgba(5,5,5,0.95)';
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.font = 'bold 14px monospace';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText('SCORE: ' + score, 14, HUD_H/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FBBF24';
    ctx.fillText('BEST: ' + highScore, W-14, HUD_H/2);
    ctx.strokeStyle = '#16A34A'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, HUD_H-0.5); ctx.lineTo(W, HUD_H-0.5); ctx.stroke();

    // Game Over
    if (phase === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.fillRect(0, HUD_H, W, H-HUD_H);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 54px monospace';
      ctx.fillStyle = '#F97316';
      ctx.shadowColor = '#F97316'; ctx.shadowBlur = 14;
      ctx.fillText('GAME OVER', W/2, H/2 - 30);
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
      ctx.font = 'bold 20px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText('SCORE: ' + score, W/2, H/2 + 10);
      if (score > 0 && score >= highScore) {
        ctx.font = 'bold 13px monospace';
        ctx.fillStyle = '#FBBF24';
        ctx.fillText('NEW BEST!', W/2, H/2 + 36);
      }
      ctx.font = '12px monospace';
      ctx.fillStyle = '#6B7280';
      ctx.fillText('PRESS R  OR  TAP TO RESTART', W/2, H/2 + 58);
    }
  }

  // ── Start screen ───────────────────────────────────────────
  function renderStartScreen() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 68px monospace';
    ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#22C55E';
    ctx.fillText('SNAKE', W/2, 55);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

    // Decorative S-shaped snake
    const inset = 2;
    const segs = [];
    const sx = 220, sy = 95, cols = 10;
    for (let i = 0; i < cols; i++)      segs.push({ x: sx + i*CELL, y: sy });
    for (let i = cols-1; i >= 0; i--)   segs.push({ x: sx + i*CELL, y: sy + CELL });
    for (let i = 0; i < 7; i++)         segs.push({ x: sx + i*CELL, y: sy + CELL*2 });

    for (let i = 0; i < segs.length; i++) {
      const bx = segs[i].x, by = segs[i].y;
      if (i === segs.length - 1) {
        ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = 6;
        ctx.fillStyle = '#22C55E';
        ctx.fillRect(bx+inset, by+inset, CELL-inset*2, CELL-inset*2);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        ctx.fillStyle = '#4ADE80';
        ctx.fillRect(bx+CELL-5, by+inset, 3, CELL-inset*2);
        const ecx = bx + CELL/2 + 4, ecy = by + CELL/2;
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath(); ctx.arc(ecx, ecy-3, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ecx, ecy+3, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath(); ctx.arc(ecx-0.5, ecy-3.5, 0.7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ecx-0.5, ecy+2.5, 0.7, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = i % 2 === 0 ? '#16A34A' : '#15803D';
        ctx.fillRect(bx+inset, by+inset, CELL-inset*2, CELL-inset*2);
      }
    }

    // Red fruit ahead of head
    const hx = segs[segs.length-1].x + CELL, hy = segs[segs.length-1].y;
    const fcx = hx + CELL/2, fcy = hy + CELL/2 + 1;
    ctx.fillStyle = '#EF4444';
    ctx.beginPath(); ctx.arc(fcx, fcy, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(fcx-2, fcy-2, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#4ADE80'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(fcx, fcy-7); ctx.lineTo(fcx+2, fcy-11); ctx.stroke();

    // How to play
    ctx.font = '14px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText('Eat red fruit to grow · Collect golden power-ups for bonus points', W/2, 218);
    ctx.fillText('Wrap around the edges · Avoid running into yourself', W/2, 240);

    ctx.font = '13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('WASD  /  Arrow Keys  to steer', W/2, 272);

    // Pulsing prompt
    const alpha = 0.45 + 0.55 * Math.sin(startPulse);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = `rgba(74,222,128,${alpha.toFixed(2)})`;
    ctx.fillText('CLICK  ·  TAP  ·  PRESS ANY KEY TO START', W/2, 326);
  }

  // ── Game loop (fixed-step — frame-rate independent) ────────
  function loop(now) {
    const dt = lastTime === 0 ? 0 : Math.min(now - lastTime, 100);
    lastTime = now;
    accumulator += dt;

    while (accumulator >= STEP) {
      if (phase === 'start') {
        startPulse += 0.08;
      } else if (phase === 'playing') {
        if (powerUp) {
          powerUp.ms -= STEP;
          if (powerUp.ms <= 0) powerUp = null;
        }
        tickAccum += STEP;
        while (tickAccum >= TICK_MS) {
          tick();
          tickAccum -= TICK_MS;
        }
        pulse   += 0.1;
        starRot += 0.035;
      }
      accumulator -= STEP;
    }

    if (phase === 'start') renderStartScreen();
    else render();

    requestAnimationFrame(loop);
  }

  // ── D-pad binding ──────────────────────────────────────────
  function bindDpad() {
    if (!window.matchMedia('(pointer: coarse)').matches) return;

    function bind(id, d) {
      const el = document.getElementById(id);
      el.addEventListener('touchstart', e => {
        e.preventDefault();
        if (phase === 'start') { phase = 'playing'; return; }
        if (phase === 'gameover') { initGame(true); return; }
        setDir(d);
        el.classList.add('pressed');
      }, { passive: false });
      el.addEventListener('touchend',    () => el.classList.remove('pressed'), { passive: false });
      el.addEventListener('touchcancel', () => el.classList.remove('pressed'), { passive: false });
    }
    bind('dp-up',    { x: 0,  y: -1 });
    bind('dp-down',  { x: 0,  y:  1 });
    bind('dp-left',  { x: -1, y:  0 });
    bind('dp-right', { x: 1,  y:  0 });

    canvas.addEventListener('touchstart', e => {
      if (phase === 'start') { e.preventDefault(); phase = 'playing'; return; }
      if (phase === 'gameover') { e.preventDefault(); initGame(true); }
    }, { passive: false });
  }

  // ── Start ──────────────────────────────────────────────────
  initGame();
  resize();
  requestAnimationFrame(loop);
  window.addEventListener('load', () => { layoutDpad(); bindDpad(); });
</script>
</body>
</html>
